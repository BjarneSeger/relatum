name: Images

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: build & push ${{ matrix.bin }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bin: [relatum-server, relatum-web]
    env:
      IMAGE: ghcr.io/bjarneseger/${{ matrix.bin }}
    steps:
      - uses: actions/checkout@v6

      # Tag/label strings only — runs without a container engine.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=edge-,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to GHCR
        run: buildah login -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}" ghcr.io

      - name: Build image
        env:
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          mapfile -t lines <<< "$LABELS"
          label_args=()
          for l in "${lines[@]}"; do
            [ -n "$l" ] && label_args+=(--label "$l")
          done
          buildah build \
            --format oci \
            --layers \
            --build-arg "BIN=${{ matrix.bin }}" \
            --cache-from "${IMAGE}/cache" \
            --cache-to "${IMAGE}/cache" \
            "${label_args[@]}" \
            --file Dockerfile \
            --tag built-image \
            .

      # Push every computed tag as zstd:chunked. On the Podman/CRI-O/OpenShift
      # target this enables partial/lazy layer pulls; elsewhere it is simply smaller,
      # faster-to-decompress zstd (vs gzip).
      - name: Push (zstd:chunked) to GHCR
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "::group::push $tag"
            buildah push --compression-format zstd:chunked built-image "docker://$tag"
            echo "::endgroup::"
          done <<< "$TAGS"

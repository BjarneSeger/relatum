name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  charts:
    name: publish Helm charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package & push relatum-server
        run: |
          helm dependency build deploy/helm/relatum-server
          helm package deploy/helm/relatum-server \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}"
          helm push "relatum-server-${{ steps.ver.outputs.version }}.tgz" oci://ghcr.io/bjarneseger/charts

      - name: Package & push relatum-web
        run: |
          helm package deploy/helm/relatum-web \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}"
          helm push "relatum-web-${{ steps.ver.outputs.version }}.tgz" oci://ghcr.io/bjarneseger/charts

  # The macOS binary is built natively here: aws-lc-sys (the rustls crypto backend)
  # compiles against the runner's platform SDK, sidestepping the zig cross-compile
  # that floods the log and fails for Apple targets. It is archived here and attached
  # to the release by the GoReleaser job below (via extra_files; see .goreleaser.yaml).
  cli-macos:
    name: build CLI (macOS native)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin

      - name: Build & archive relatum (aarch64-apple-darwin)
        run: |
          cargo build --release -p relatum-cli --target aarch64-apple-darwin
          version="${GITHUB_REF_NAME#v}"
          mkdir -p prebuilt
          tar -cJf "prebuilt/relatum-${version}-darwin-arm64.tar.xz" \
            -C target/aarch64-apple-darwin/release relatum

      - name: Upload macOS archive
        uses: actions/upload-artifact@v4
        with:
          name: relatum-macos-archive
          path: prebuilt/relatum-*-darwin-arm64.tar.xz
          if-no-files-found: error
          retention-days: 1

  cli:
    name: release CLI (GoReleaser)
    runs-on: ubuntu-latest
    needs: cli-macos
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # cmake + a C compiler build aws-lc-sys for the Linux (musl) cross targets.
      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config cmake clang

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      # cargo-zigbuild uses Zig as the cross-linker for the Linux musl targets.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      # The macOS archive was built natively in the cli-macos job; GoReleaser attaches
      # it to the release and SHA256SUMS via extra_files (see .goreleaser.yaml).
      - name: Download macOS archive
        uses: actions/download-artifact@v7
        with:
          name: relatum-macos-archive
          path: prebuilt

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

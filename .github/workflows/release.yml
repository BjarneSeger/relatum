name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  charts:
    name: publish Helm charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package & push relatum-server
        run: |
          helm dependency build deploy/helm/relatum-server
          helm package deploy/helm/relatum-server \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}"
          helm push "relatum-server-${{ steps.ver.outputs.version }}.tgz" oci://ghcr.io/bjarneseger/charts

      - name: Package & push relatum-web
        run: |
          helm package deploy/helm/relatum-web \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}"
          helm push "relatum-web-${{ steps.ver.outputs.version }}.tgz" oci://ghcr.io/bjarneseger/charts

  cli:
    name: release CLI (GoReleaser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # aws-lc-sys (via rustls) needs cmake + a C compiler at build time.
      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config cmake clang

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      # cargo-zigbuild uses Zig as the cross-linker (no per-OS toolchains needed).
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      # cargo-zigbuild links the aarch64-apple-darwin build against the macOS SDK.
      # Provide one and point SDKROOT at it (Apple SDK license applies — see the
      # plan's risks; the alternative is a native macos-latest build for this target).
      - name: Stage macOS SDK
        id: sdk
        run: |
          SDK_VERSION=14.5
          curl -fsSL -o "$RUNNER_TEMP/MacOSX.sdk.tar.xz" \
            "https://github.com/joseluisq/macosx-sdks/releases/download/${SDK_VERSION}/MacOSX${SDK_VERSION}.sdk.tar.xz"
          mkdir -p "$HOME/sdk"
          tar -xJf "$RUNNER_TEMP/MacOSX.sdk.tar.xz" -C "$HOME/sdk"
          echo "sdkroot=$HOME/sdk/MacOSX${SDK_VERSION}.sdk" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SDKROOT: ${{ steps.sdk.outputs.sdkroot }}

<tr id="report-{{ r.id }}">
  <td><a href="/reports/{{ r.id }}">{{ r.week }}</a></td>
  <td>{{ r.author }}</td>
  <td><span class="status status-{{ r.status_class }}">{{ r.status_label }}</span></td>
  <td class="row-actions">
    {% if show_submit %}<button class="btn-sm" hx-post="/reports/{{ r.id }}/submit" hx-target="#report-{{ r.id }}" hx-swap="outerHTML">Submit</button>{% endif %}
    {% if show_sign %}<button class="btn-sm" hx-post="/reports/{{ r.id }}/review" hx-vals='{"decision": "sign"}' hx-target="#report-{{ r.id }}" hx-swap="outerHTML">Sign</button>{% endif %}
    <a class="btn-sm btn-ghost" href="/reports/{{ r.id }}">Open</a>
  </td>
</tr>

{{- /*
Managed credentials secret. Holds the connection URLs the server reads, plus
the bundled Postgres password when that is enabled. Skipped entirely when the
user references their own existing secrets for both URLs (or uses the in-memory
backends).

The Postgres password is resolved exactly once here (into $pw) and reused for
both the URL and the `password` key, so the value the server connects with and
the value the database is initialised with can never diverge within a render.
*/ -}}
{{- $manageDb := eq (include "relatum-server.manageDbSecret" .) "true" -}}
{{- $manageSessions := eq (include "relatum-server.manageSessionsSecret" .) "true" -}}
{{- if $manageDb }}
{{- $pw := include "relatum-server.postgresPassword" . -}}
{{- $url := "" -}}
{{- if .Values.database.url -}}
{{- $url = .Values.database.url -}}
{{- else if .Values.postgresql.enabled -}}
{{- $url = printf "postgres://%s:%s@%s:%v/%s" .Values.postgresql.username $pw (include "relatum-server.postgresName" .) .Values.postgresql.service.port .Values.postgresql.database -}}
{{- else if .Values.externalDatabase.host -}}
{{- with .Values.externalDatabase -}}
{{- $url = printf "postgres://%s:%s@%s:%v/%s%s" .username .password .host .port .database .params -}}
{{- end -}}
{{- else -}}
{{- fail "config.data.backend is \"postgres\" but no database source is configured: set database.existingSecret, database.url, postgresql.enabled, or externalDatabase.host" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "relatum-server.dbSecretName" . }}
  labels:
    {{- include "relatum-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ $url | quote }}
  {{- if .Values.postgresql.enabled }}
  password: {{ $pw | quote }}
  {{- end }}
{{- end }}
{{- if $manageSessions }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "relatum-server.sessionsSecretName" . }}
  labels:
    {{- include "relatum-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ include "relatum-server.sessionsUrl" . | quote }}
{{- end }}
{{- if eq (include "relatum-server.manageSsoSecret" .) "true" }}
{{- if not .Values.config.sso.oidc.clientSecret }}
{{- fail "config.sso.backend is \"oidc\" but no client secret is set: provide config.sso.oidc.clientSecret or config.sso.oidc.clientSecretExistingSecret" -}}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "relatum-server.ssoSecretName" . }}
  labels:
    {{- include "relatum-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ .Values.config.sso.oidc.clientSecret | quote }}
{{- end }}

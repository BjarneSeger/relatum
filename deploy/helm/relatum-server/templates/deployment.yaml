{{- include "relatum-server.validateValues" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "relatum-server.fullname" . }}
  labels:
    {{- include "relatum-server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "relatum-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the rendered config/credentials change.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "relatum-server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        app.kubernetes.io/component: server
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "relatum-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "relatum-server.fullname" . }}
          env:
            {{- if eq .Values.config.data.backend "postgres" }}
            - name: RELATUM_DATA_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "relatum-server.dbSecretName" . }}
                  key: {{ include "relatum-server.dbSecretKey" . }}
            {{- end }}
            {{- if eq .Values.config.sessions.backend "redis" }}
            - name: RELATUM_SESSIONS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "relatum-server.sessionsSecretName" . }}
                  key: {{ include "relatum-server.sessionsSecretKey" . }}
            {{- end }}
            {{- if eq .Values.config.sso.backend "oidc" }}
            - name: RELATUM_SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "relatum-server.ssoSecretName" . }}
                  key: {{ include "relatum-server.ssoSecretKey" . }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
